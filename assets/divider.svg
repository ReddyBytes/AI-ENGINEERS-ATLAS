<svg viewBox="0 0 900 28" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#6366f1;stop-opacity:0"/>
      <stop offset="20%"  style="stop-color:#a78bfa;stop-opacity:0.9"/>
      <stop offset="50%"  style="stop-color:#60a5fa"/>
      <stop offset="80%"  style="stop-color:#34d399;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#0a0a1f"/>
      <stop offset="50%"  style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#0a0a1f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="28" fill="url(#bgGrad)"/>

  <!-- Main gradient line -->
  <line x1="0" y1="14" x2="900" y2="14" stroke="url(#lineGrad)" stroke-width="1.5"/>

  <!-- Outer dots -->
  <circle cx="120" cy="14" r="2"   fill="#818cf8" opacity="0.6"/>
  <circle cx="240" cy="14" r="1.5" fill="#a78bfa" opacity="0.5"/>
  <circle cx="660" cy="14" r="1.5" fill="#34d399" opacity="0.5"/>
  <circle cx="780" cy="14" r="2"   fill="#6ee7b7" opacity="0.6"/>

  <!-- Left node -->
  <circle cx="300" cy="14" r="3.5" fill="#a78bfa" filter="url(#glow)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <!-- Center diamond -->
  <polygon points="450,7 458,14 450,21 442,14" fill="#60a5fa" filter="url(#glow)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
  </polygon>

  <!-- Right node -->
  <circle cx="600" cy="14" r="3.5" fill="#34d399" filter="url(#glow)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.8s" repeatCount="indefinite"/>
  </circle>
</svg>
