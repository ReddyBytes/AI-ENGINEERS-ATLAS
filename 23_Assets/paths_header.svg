<svg viewBox="0 0 900 130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Beginner — green -->
    <linearGradient id="bg1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#052e16"/>
      <stop offset="100%" style="stop-color:#0a0a1f"/>
    </linearGradient>
    <!-- Intermediate — yellow/amber -->
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#2d1f00"/>
      <stop offset="100%" style="stop-color:#0a0a1f"/>
    </linearGradient>
    <!-- Advanced — red -->
    <linearGradient id="bg3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#3b0a0a"/>
      <stop offset="100%" style="stop-color:#0a0a1f"/>
    </linearGradient>
    <!-- Expert — purple -->
    <linearGradient id="bg4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#2e1065"/>
      <stop offset="100%" style="stop-color:#0a0a1f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Four track panels -->
  <rect x="0"   y="0" width="225" height="130" fill="url(#bg1)"/>
  <rect x="225" y="0" width="225" height="130" fill="url(#bg2)"/>
  <rect x="450" y="0" width="225" height="130" fill="url(#bg3)"/>
  <rect x="675" y="0" width="225" height="130" fill="url(#bg4)"/>

  <!-- Top accent bars — matching emoji colors below -->
  <rect x="0"   y="0" width="225" height="4" fill="#10b981"/>
  <rect x="225" y="0" width="225" height="4" fill="#eab308"/>
  <rect x="450" y="0" width="225" height="4" fill="#ef4444"/>
  <rect x="675" y="0" width="225" height="4" fill="#8b5cf6"/>

  <!-- Subtle bottom glow per panel -->
  <rect x="0"   y="120" width="225" height="10" fill="#10b981" opacity="0.08"/>
  <rect x="225" y="120" width="225" height="10" fill="#eab308" opacity="0.08"/>
  <rect x="450" y="120" width="225" height="10" fill="#ef4444" opacity="0.08"/>
  <rect x="675" y="120" width="225" height="10" fill="#8b5cf6" opacity="0.08"/>

  <!-- Vertical dividers -->
  <line x1="225" y1="8" x2="225" y2="122" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="450" y1="8" x2="450" y2="122" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="675" y1="8" x2="675" y2="122" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Section range badges -->
  <rect x="16"  y="16" width="48" height="20" rx="10" fill="#10b981" opacity="0.2"/>
  <rect x="241" y="16" width="48" height="20" rx="10" fill="#eab308" opacity="0.2"/>
  <rect x="466" y="16" width="48" height="20" rx="10" fill="#ef4444" opacity="0.2"/>
  <rect x="691" y="16" width="48" height="20" rx="10" fill="#8b5cf6" opacity="0.2"/>

  <text x="40"  y="30" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#10b981" letter-spacing="1">00–03</text>
  <text x="265" y="30" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#eab308" letter-spacing="1">04–07</text>
  <text x="490" y="30" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#ef4444" letter-spacing="1">08–13</text>
  <text x="715" y="30" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#a78bfa" letter-spacing="1">14–19</text>

  <!-- Track labels — colors match the emoji badges in the table below -->
  <text x="112" y="72" text-anchor="middle" font-family="'Courier New', monospace" font-size="17" font-weight="bold" fill="#10b981" letter-spacing="3" filter="url(#glow)">🟢 BEGINNER</text>
  <text x="337" y="72" text-anchor="middle" font-family="'Courier New', monospace" font-size="17" font-weight="bold" fill="#eab308" letter-spacing="2" filter="url(#glow)">🟡 INTERMEDIATE</text>
  <text x="562" y="72" text-anchor="middle" font-family="'Courier New', monospace" font-size="17" font-weight="bold" fill="#ef4444" letter-spacing="3" filter="url(#glow)">🔴 ADVANCED</text>
  <text x="787" y="72" text-anchor="middle" font-family="'Courier New', monospace" font-size="17" font-weight="bold" fill="#a78bfa" letter-spacing="3" filter="url(#glow)">🟣 EXPERT</text>

  <!-- Subtitles -->
  <text x="112" y="96" text-anchor="middle" font-family="monospace" font-size="11" fill="#6ee7b7" opacity="0.8">Math · ML · Classical AI</text>
  <text x="337" y="96" text-anchor="middle" font-family="monospace" font-size="11" fill="#fde047" opacity="0.8">Deep Learning · NLP · LLMs</text>
  <text x="562" y="96" text-anchor="middle" font-family="monospace" font-size="11" fill="#fca5a5" opacity="0.8">RAG · Agents · Production</text>
  <text x="787" y="96" text-anchor="middle" font-family="monospace" font-size="11" fill="#c4b5fd" opacity="0.8">HF · LangGraph · Eval · RL</text>

  <!-- Taglines -->
  <text x="112" y="115" text-anchor="middle" font-family="monospace" font-size="9.5" fill="#10b981" opacity="0.6">Build the mental models first</text>
  <text x="337" y="115" text-anchor="middle" font-family="monospace" font-size="9.5" fill="#eab308" opacity="0.6">Go deeper into modern AI</text>
  <text x="562" y="115" text-anchor="middle" font-family="monospace" font-size="9.5" fill="#ef4444" opacity="0.6">Ship real AI systems</text>
  <text x="787" y="115" text-anchor="middle" font-family="monospace" font-size="9.5" fill="#8b5cf6" opacity="0.6">Master the frontier</text>
</svg>
