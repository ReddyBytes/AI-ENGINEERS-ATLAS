<svg viewBox="0 0 900 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sbg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#0a0a1f"/>
      <stop offset="25%"  style="stop-color:#1e1b4b"/>
      <stop offset="75%"  style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0a0a1f"/>
    </linearGradient>
    <linearGradient id="topLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#6366f1;stop-opacity:0"/>
      <stop offset="30%"  style="stop-color:#a78bfa"/>
      <stop offset="50%"  style="stop-color:#60a5fa"/>
      <stop offset="70%"  style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="80" fill="url(#sbg)"/>

  <!-- Top and bottom accent lines -->
  <rect x="0" y="0"  width="900" height="2" fill="url(#topLine)"/>
  <rect x="0" y="78" width="900" height="2" fill="url(#topLine)"/>

  <!-- Left decorative chevrons -->
  <text x="195" y="47" font-family="monospace" font-size="18" fill="#6366f1" opacity="0.35">›</text>
  <text x="212" y="47" font-family="monospace" font-size="18" fill="#818cf8" opacity="0.55">›</text>
  <text x="228" y="47" font-family="monospace" font-size="18" fill="#a78bfa" opacity="0.75">›</text>
  <text x="244" y="47" font-family="monospace" font-size="18" fill="#c4b5fd" opacity="0.9">›</text>

  <!-- Rocket icon -->
  <text x="298" y="50" font-family="monospace" font-size="22" fill="#e2e8f0" filter="url(#softglow)">🚀</text>

  <!-- Main text -->
  <text x="450" y="48" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="20" font-weight="bold"
        fill="#e2e8f0" letter-spacing="8"
        filter="url(#glow)">START YOUR JOURNEY</text>

  <!-- Right decorative chevrons (mirrored) -->
  <text x="585" y="47" font-family="monospace" font-size="18" fill="#c4b5fd" opacity="0.9">‹</text>
  <text x="600" y="47" font-family="monospace" font-size="18" fill="#a78bfa" opacity="0.75">‹</text>
  <text x="616" y="47" font-family="monospace" font-size="18" fill="#818cf8" opacity="0.55">‹</text>
  <text x="632" y="47" font-family="monospace" font-size="18" fill="#6366f1" opacity="0.35">‹</text>

  <!-- Pulsing dot left -->
  <circle cx="80" cy="40" r="4" fill="#6366f1" filter="url(#softglow)">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="110" cy="40" r="2.5" fill="#818cf8">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Pulsing dot right -->
  <circle cx="820" cy="40" r="4" fill="#34d399" filter="url(#softglow)">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.5s" begin="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="790" cy="40" r="2.5" fill="#6ee7b7">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2s" begin="1.7s" repeatCount="indefinite"/>
  </circle>
</svg>
